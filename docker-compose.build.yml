# ==============================================================
# HIS 诊所管理系统 - 维护方本地构建版
# 用途：在本机构建镜像，用于开发调试或构建新版本
# 用法：docker-compose -f docker-compose.build.yml up -d
# ==============================================================

services:
  # Nginx Web 服务器（本地构建）
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: his-nginx
    ports:
      - "${DOCKER_NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - his_network
    restart: unless-stopped

  # PHP-FPM 应用容器（本地构建）
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: his-app
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./public/uploads:/var/www/html/public/uploads
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-saas}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his_network
    restart: unless-stopped

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: his-mysql
    ports:
      - "${DOCKER_MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - MYSQL_DATABASE=${DB_DATABASE:-saas}
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # 使用 CMD-SHELL 确保环境变量能正确展开（CMD exec 格式不经过 shell，变量无法展开）
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - his_network
    restart: unless-stopped

  # Redis 缓存与队列
  redis:
    image: redis:alpine
    container_name: his-redis
    ports:
      - "${DOCKER_REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker/data/redis:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - his_network
    restart: unless-stopped

networks:
  his_network:
    driver: bridge
